name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build-push
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/GradingSystem.Api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/grading-system-api:latest
            ${{ secrets.DOCKER_USERNAME }}/grading-system-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./fe/grading-system
          file: ./fe/grading-system/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/grading-system-fe:latest
            ${{ secrets.DOCKER_USERNAME }}/grading-system-fe:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/GradingSystem.Worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/grading-system-worker:latest
            ${{ secrets.DOCKER_USERNAME }}/grading-system-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy Deployment
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        if: env.DOKPLOY_WEBHOOK_URL != ''
        run: curl -X GET "$DOKPLOY_WEBHOOK_URL"
