name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build-push
  cancel-in-progress: true

jobs:
  push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_REPO: ghcr.io/${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/GradingSystem.Api/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REPO }}/grading-system-api:${{ env.IMAGE_TAG }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/GradingSystem.Worker/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REPO }}/grading-system-worker:${{ env.IMAGE_TAG }}
